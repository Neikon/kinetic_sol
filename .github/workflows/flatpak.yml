name: Flatpak

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_ID: dev.neikon.kinetic_sol
  APP_NAME: KineticSOL
  FLATPAK_REMOTE_NAME: kineticsol
  MANIFEST_PATH: dev.neikon.kinetic_sol.json
  BUNDLE_NAME: dev.neikon.kinetic_sol.flatpak
  FLATPAK_BRANCH: main
  PAGES_ARTIFACT_DIR: flatpak-pages
  FLATPAKREPO_NAME: kineticsol.flatpakrepo

concurrency:
  group: flatpak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Collect release metadata
        id: metadata
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          meson_text = Path('meson.build').read_text(encoding='utf-8')
          version_match = re.search(r"version:\s*'([^']+)'", meson_text)
          if version_match is None:
              raise SystemExit('Failed to extract app version from meson.build')

          app_version = version_match.group(1)

          root = ET.parse('data/dev.neikon.kinetic_sol.metainfo.xml.in').getroot()
          releases = root.find('releases')
          if releases is None or not list(releases):
              raise SystemExit('No releases found in metainfo')

          latest_release = list(releases)[0]
          metainfo_version = latest_release.attrib.get('version', '').strip()
          if not metainfo_version:
              raise SystemExit('Latest metainfo release has no version')

          if metainfo_version != app_version:
              raise SystemExit(
                  f'Version mismatch: meson.build={app_version} metainfo={metainfo_version}'
              )

          description = latest_release.find('description')
          if description is None:
              raise SystemExit('Latest metainfo release has no description')

          release_notes = ''.join(
              ET.tostring(child, encoding='unicode', method='xml')
              for child in description
          ).strip()
          if not release_notes:
              raise SystemExit('Latest metainfo release has empty release notes')

          run_number = os.environ['GITHUB_RUN_NUMBER']
          github_sha = os.environ['GITHUB_SHA']
          short_sha = github_sha[:7]
          repository_owner, repository_name = os.environ['GITHUB_REPOSITORY'].split('/', 1)
          pages_base_url = f'https://{repository_owner.lower()}.github.io/{repository_name}'
          pages_repo_url = f'{pages_base_url}/repo/'
          flatpakrepo_url = f'{pages_base_url}/{os.environ["FLATPAKREPO_NAME"]}'

          main_release_tag = f'v{app_version}-main.{run_number}'
          main_release_name = f'KineticSOL {app_version} main build #{run_number}'
          release_name = f'KineticSOL {app_version}'
          main_release_body = (
              f'{release_notes}\n\n'
              '---\n'
              f'Automated Flatpak bundle built from `main`.\n\n'
              f'- Version: `{app_version}`\n'
              f'- Commit: `{github_sha}`\n'
              f'- Short SHA: `{short_sha}`\n'
              f'- Run: `{run_number}`'
          )

          output_path = Path(os.environ['GITHUB_OUTPUT'])
          with output_path.open('a', encoding='utf-8') as output:
              output.write(f'app_version={app_version}\n')
              output.write(f'main_release_tag={main_release_tag}\n')
              output.write(f'main_release_name={main_release_name}\n')
              output.write(f'release_name={release_name}\n')
              output.write(f'pages_base_url={pages_base_url}\n')
              output.write(f'pages_repo_url={pages_repo_url}\n')
              output.write(f'flatpakrepo_url={flatpakrepo_url}\n')
              output.write('release_notes<<EOF\n')
              output.write(release_notes)
              output.write('\nEOF\n')
              output.write('main_release_body<<EOF\n')
              output.write(main_release_body)
              output.write('\nEOF\n')
          PY

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: ${{ env.MANIFEST_PATH }}
          bundle: ${{ env.BUNDLE_NAME }}
          branch: ${{ env.FLATPAK_BRANCH }}
          cache-key: flatpak-builder-${{ github.ref_name }}-${{ github.sha }}
          upload-artifact: true

      - name: Refresh static repo metadata
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          flatpak build-update-repo \
            --generate-static-deltas \
            repo

      - name: Prepare GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          RELEASE_NOTES_HTML: ${{ steps.metadata.outputs.release_notes }}
        run: |
          rm -rf "${PAGES_ARTIFACT_DIR}"
          mkdir -p "${PAGES_ARTIFACT_DIR}"
          cp -R repo "${PAGES_ARTIFACT_DIR}/repo"
          python3 scripts/prepare_flatpak_pages.py \
            --output-dir "${PAGES_ARTIFACT_DIR}" \
            --app-id "${APP_ID}" \
            --app-name "${APP_NAME}" \
            --app-version "${{ steps.metadata.outputs.app_version }}" \
            --release-notes-html "${RELEASE_NOTES_HTML}" \
            --repo-url "${{ steps.metadata.outputs.pages_repo_url }}" \
            --homepage-url "https://github.com/${GITHUB_REPOSITORY}" \
            --remote-name "${FLATPAK_REMOTE_NAME}" \
            --default-branch "${FLATPAK_BRANCH}" \
            --flatpakrepo-name "${FLATPAKREPO_NAME}"

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_ARTIFACT_DIR }}

      - name: Create prerelease for main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.main_release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.metadata.outputs.main_release_name }}
          body: ${{ steps.metadata.outputs.main_release_body }}
          prerelease: true
          make_latest: false
          files: ${{ env.BUNDLE_NAME }}
          fail_on_unmatched_files: true

      - name: Upload bundle to published GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          name: ${{ steps.metadata.outputs.release_name }}
          body: ${{ steps.metadata.outputs.release_notes }}
          files: ${{ env.BUNDLE_NAME }}
          fail_on_unmatched_files: true

  deploy-pages:
    name: Deploy Flatpak Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'release'
    needs: build-flatpak
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
