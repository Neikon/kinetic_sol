<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="128"
  height="128"
  viewBox="0 0 128 128"
  version="1.1">
  <defs>
    <linearGradient id="bgGradient" x1="18" y1="16" x2="112" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25243f"/>
      <stop offset="1" stop-color="#151528"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 76) rotate(90) scale(48 52)">
      <stop offset="0" stop-color="#3b356f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b356f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="powerGradient" x1="40" y1="24" x2="88" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e7ffff"/>
      <stop offset="0.42" stop-color="#99ddff"/>
      <stop offset="1" stop-color="#9386ff"/>
    </linearGradient>
    <linearGradient id="arcGradient" x1="18" y1="36" x2="110" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6aa4ff" stop-opacity="0.14"/>
      <stop offset="0.5" stop-color="#8ca2ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ac8dff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="innerGlowGradient" x1="64" y1="58" x2="64" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8d84ff" stop-opacity="0"/>
      <stop offset="1" stop-color="#8d84ff" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#090914" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4.2"/>
    </filter>
    <filter id="flare" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="10" y="10" width="108" height="108" rx="30" ry="30" fill="url(#bgGradient)"/>
    <rect x="10" y="10" width="108" height="108" rx="30" ry="30" fill="url(#bgGlow)"/>
  </g>

  <ellipse cx="64" cy="78" rx="27" ry="18" fill="url(#innerGlowGradient)"/>

  <path
    d="M 47 41 A 24 24 0 1 0 81 41"
    fill="none"
    stroke="url(#powerGradient)"
    stroke-width="11.5"
    stroke-linecap="round"/>

  <rect
    x="58"
    y="24"
    width="12"
    height="29"
    rx="6"
    ry="6"
    fill="url(#powerGradient)"/>

  <path
    d="M 28 42 A 44 44 0 0 0 28 86"
    fill="none"
    stroke="url(#arcGradient)"
    stroke-width="6.5"
    stroke-linecap="round"/>
  <path
    d="M 100 42 A 44 44 0 0 1 100 86"
    fill="none"
    stroke="url(#arcGradient)"
    stroke-width="6.5"
    stroke-linecap="round"/>

  <circle cx="64" cy="84" r="5.2" fill="#9f8dff"/>
  <circle cx="64" cy="84" r="9.5" fill="#7292ff" opacity="0.65" filter="url(#glow)"/>
  <path d="M 50 84 H 78" stroke="#6f88ff" stroke-width="1.8" stroke-linecap="round" opacity="0.62" filter="url(#flare)"/>
  <path d="M 64 72 V 96" stroke="#6f88ff" stroke-width="1.8" stroke-linecap="round" opacity="0.34" filter="url(#flare)"/>
</svg>
